{% extends 'base.html' %}
{% block title %}Ustawienia{% endblock %}

{% block content %}
<div class="settings-layout">

  <aside class="settings-sidebar">
    <nav class="settings-nav">
      <a href="{{ url_for('settings.general') }}"
         class="settings-nav-item {{ 'active' if active_tab == 'general' }}">
        Integracje
      </a>
      <a href="{{ url_for('settings.dictionary') }}"
         class="settings-nav-item {{ 'active' if active_tab == 'dictionary' }}">
        Słownik
      </a>
      <a href="{{ url_for('users.list_users') }}"
         class="settings-nav-item {{ 'active' if active_tab == 'users' }}">
        Użytkownicy
      </a>
      <a href="{{ url_for('settings.logs') }}"
         class="settings-nav-item {{ 'active' if active_tab == 'logs' }}">
        Logi
      </a>
    </nav>
  </aside>

  <section class="settings-content">
    {% block settings_content %}{% endblock %}
  </section>

</div>
{% endblock %}
