{% extends 'settings/_layout.html' %}
{% block settings_content %}

<h2>Logi aplikacji</h2>

<div class="settings-section">
  <div style="display:flex; gap:.75rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap;">
    <label style="font-size:.875rem;">
      Liczba linii:
      <select id="linesSelect" style="margin-left:.4rem;">
        <option value="50">50</option>
        <option value="200" selected>200</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
      </select>
    </label>
    <label style="font-size:.875rem; display:flex; align-items:center; gap:.4rem;">
      <input type="checkbox" id="autoRefresh"> Odświeżaj co 10 s
    </label>
    <button class="btn btn-outline" id="btnRefresh">Odśwież</button>
    <button class="btn btn-outline" id="btnClear" style="margin-left:auto;">Wyczyść plik logów</button>
  </div>

  <pre id="logOutput" style="
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    font-size: .78rem;
    line-height: 1.5;
    max-height: 70vh;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  ">Ładowanie…</pre>
</div>

{% endblock %}

{% block scripts %}
<script>
let _autoTimer = null;

function colorLine(line) {
  if (line.includes(' ERROR '))   return `<span style="color:var(--danger)">${esc(line)}</span>`;
  if (line.includes(' WARNING ')) return `<span style="color:#f59e0b">${esc(line)}</span>`;
  if (line.includes(' INFO '))    return `<span style="color:var(--text-muted)">${esc(line)}</span>`;
  return esc(line);
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadLogs() {
  const lines = document.getElementById('linesSelect').value;
  const pre   = document.getElementById('logOutput');
  try {
    const r = await fetch(API_BASE + `/api/logs?lines=${lines}`, { credentials: 'same-origin' });
    const d = await r.json();
    if (d.error) { pre.innerHTML = `<span style="color:var(--danger)">${esc(d.error)}</span>`; return; }
    if (!d.lines || d.lines.length === 0) {
      pre.textContent = '(brak wpisów w logu)';
      return;
    }
    pre.innerHTML = d.lines.map(colorLine).join('\n');
    pre.scrollTop = pre.scrollHeight;
  } catch (e) {
    pre.textContent = 'Błąd pobierania logów: ' + e.message;
  }
}

document.getElementById('btnRefresh').addEventListener('click', loadLogs);

document.getElementById('linesSelect').addEventListener('change', loadLogs);

document.getElementById('autoRefresh').addEventListener('change', function() {
  clearInterval(_autoTimer);
  if (this.checked) _autoTimer = setInterval(loadLogs, 10000);
});

document.getElementById('btnClear').addEventListener('click', async () => {
  if (!confirm('Czy na pewno wyczyścić plik logów?')) return;
  const r = await fetch(API_BASE + '/api/logs/clear', { method: 'POST', credentials: 'same-origin' });
  const d = await r.json();
  if (d.ok) loadLogs();
  else alert('Błąd: ' + (d.error || 'nieznany'));
});

loadLogs();
</script>
{% endblock %}
