<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RosliNarnia – Logowanie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 4px 20px rgba(31, 41, 55, .07), 0 1px 3px rgba(31, 41, 55, .04);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .logo h1 {
      font-size: 24px;
      background: linear-gradient(to right, #3b82f6, #4f46e5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo p {
      color: #6b7280;
      font-size: 0.875rem;
      margin-top: 0.3rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1f2937;
      margin-bottom: 0.35rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .remember input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: #3b82f6;
      cursor: pointer;
      flex-shrink: 0;
    }

    .remember label {
      margin: 0;
      font-weight: 400;
      color: #6b7280;
      cursor: pointer;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #eaecf0;
      border-radius: 16px;
      font-size: 1rem;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1f2937;
      background: #f5f7fa;
      transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
      background: #ffffff;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 16px;
      padding: 0.6rem 0.9rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(to right, #3b82f6, #4f46e5);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(59, 130, 246, .18);
      transition: transform 0.2s ease-in-out, filter 0.2s ease-in-out;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>RosliNarnia</h1>
      <p>System zarządzania finansami</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login') }}" autocomplete="off">
      <div class="field">
        <label for="login">Login</label>
        <input type="text" id="login" name="login" required autofocus>
      </div>
      <div class="field">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="remember">
        <input type="checkbox" id="remember" name="remember" value="1">
        <label for="remember">Pozostań zalogowany przez 2 tygodnie</label>
      </div>
      <button type="submit">Zaloguj się</button>
    </form>
  </div>
</body>
</html>
